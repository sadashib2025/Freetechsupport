<div class="container my-5">
<h2>JPG to PDF Converter</h2>

<input type="file" id="imageInput" accept="image/jpeg" multiple class="form-control my-3">

<button id="convertBtn" class="btn btn-primary">Convert to PDF</button>

</div>

<script>

document.getElementById("convertBtn").addEventListener("click", async function () {

const { jsPDF } = window.jspdf;
const pdf = new jsPDF();

const files = document.getElementById("imageInput").files;

if (files.length === 0) {
alert("Please select at least one JPG image.");
return;
}

for (let i = 0; i < files.length; i++) {

const file = files[i];

const reader = new FileReader();

await new Promise((resolve) => {

reader.onload = function (e) {

const img = new Image();
img.src = e.target.result;

img.onload = function () {

const imgWidth = 210; 
const pageHeight = 295;
const imgHeight = (img.height * imgWidth) / img.width;

if (i > 0) pdf.addPage();

pdf.addImage(img, "JPEG", 0, 0, imgWidth, imgHeight);

resolve();
};

};

reader.readAsDataURL(file);

});

}

pdf.save("converted.pdf");

});

</script>
