<div class="container my-5">
<h2>Image Compressor</h2>

<input type="file" id="imageInput" class="form-control my-3">

<button id="compressBtn" class="btn btn-primary">Compress</button>

<a id="downloadLink" class="btn btn-success mt-3 d-none">Download</a>

</div>

<script>

document.getElementById("compressBtn").addEventListener("click", async function () {

const imageFile = document.getElementById('imageInput').files[0];

if (!imageFile) {
alert("Please select an image");
return;
}

const options = {
maxSizeMB: 0.5,
maxWidthOrHeight: 1024,
useWebWorker: true
};

const compressedFile = await imageCompression(imageFile, options);

const link = document.getElementById('downloadLink');
link.href = URL.createObjectURL(compressedFile);
link.download = "compressed.jpg";
link.classList.remove('d-none');

});

</script>
